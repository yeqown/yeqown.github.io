<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .grid { stroke: rgba(148,163,184,.12); stroke-width: 1; }
      .title { fill: #e2e8f0; font: 700 24px 'JetBrains Mono', monospace; }
      .sub { fill: #94a3b8; font: 12px 'JetBrains Mono', monospace; }
      .box { stroke-width: 2; rx: 14; ry: 14; }
      .label { fill: #e2e8f0; font: 600 16px 'JetBrains Mono', monospace; }
      .small { fill: #cbd5e1; font: 12px 'JetBrains Mono', monospace; }
      .arrow { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,.10)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <rect x="0" y="0" width="1200" height="520" fill="url(#grid)"/>

  <text class="title" x="60" y="52">BambooHouse 查询裁剪链路</text>
  <text class="sub" x="60" y="76">minmax.idx → primary.idx → mark 文件 → Residual Filter</text>

  <line class="arrow" x1="290" y1="132" x2="330" y2="132"/>
  <line class="arrow" x1="540" y1="132" x2="580" y2="132"/>
  <line class="arrow" x1="790" y1="132" x2="830" y2="132"/>

  <rect x="80" y="110" width="210" height="60" class="box" fill="rgba(120,53,15,.28)" stroke="#fbbf24"/>
  <text class="label" x="185" y="143" text-anchor="middle">minmax.idx</text>
  <text class="small" x="185" y="162" text-anchor="middle">Part 裁剪</text>

  <rect x="330" y="110" width="210" height="60" class="box" fill="rgba(120,53,15,.28)" stroke="#fbbf24"/>
  <text class="label" x="435" y="143" text-anchor="middle">primary.idx</text>
  <text class="small" x="435" y="162" text-anchor="middle">Granule 裁剪</text>

  <rect x="580" y="110" width="210" height="60" class="box" fill="rgba(120,53,15,.28)" stroke="#fbbf24"/>
  <text class="label" x="685" y="143" text-anchor="middle">mark 文件</text>
  <text class="small" x="685" y="162" text-anchor="middle">定位压缩块</text>

  <rect x="830" y="110" width="230" height="60" class="box" fill="rgba(6,78,59,.35)" stroke="#34d399"/>
  <text class="label" x="945" y="143" text-anchor="middle">Residual Filter</text>
  <text class="small" x="945" y="162" text-anchor="middle">最终逐行确认</text>

  <text class="small" x="80" y="240">先用分区/主键/mark 逐级缩小范围，再做必要的列解压和逐行判断。</text>
</svg>